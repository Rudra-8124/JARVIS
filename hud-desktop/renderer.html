<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000;
            --primary-glow: #00C8FF;
            --secondary-blue: #0088BB;
            --accent-blue: #004466;
            --text-cyan: #00E5FF;
            --warning-orange: #FF6600;
            --danger-red: #FF3300;
            --dim-blue: rgba(0, 200, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        html, body {
            background: transparent;
            font-family: 'Orbitron', sans-serif;
            color: var(--text-cyan);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --------------------------------------------------------------------- */
        /* HUD WINDOW & DRAGGING */
        /* --------------------------------------------------------------------- */
        .hud-window {
            width: 480px;
            height: 640px;
            background: var(--bg-black);
            border: 1px solid var(--accent-blue);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.2);
            overflow: hidden;
        }

        .no-drag {
            -webkit-app-region: no-drag;
        }

        /* --------------------------------------------------------------------- */
        /* PURE CSS CORNER BRACKETS & CHEVRONS */
        /* --------------------------------------------------------------------- */
        .corner {
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid var(--primary-glow);
            pointer-events: none;
            z-index: 20;
        }
        .corner.top-left {
            top: 6px;
            left: 6px;
            border-right: none;
            border-bottom: none;
        }
        .corner.top-right {
            top: 6px;
            right: 6px;
            border-left: none;
            border-bottom: none;
        }
        .corner.bottom-left {
            bottom: 6px;
            left: 6px;
            border-right: none;
            border-top: none;
        }
        .corner.bottom-right {
            bottom: 6px;
            right: 6px;
            border-left: none;
            border-top: none;
        }

        .chevron-top {
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid var(--primary-glow);
            pointer-events: none;
            z-index: 20;
        }
        .chevron-bottom {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 6px solid var(--primary-glow);
            pointer-events: none;
            z-index: 20;
        }

        /* --------------------------------------------------------------------- */
        /* SCAN LINE EFFECT */
        /* --------------------------------------------------------------------- */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(0, 229, 255, 0.06);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.12);
            pointer-events: none;
            z-index: 10;
            animation: scanAnimation 8s linear infinite;
        }
        @keyframes scanAnimation {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        /* --------------------------------------------------------------------- */
        /* TOP BAR */
        /* --------------------------------------------------------------------- */
        .top-bar {
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--accent-blue);
            background: rgba(0, 15, 30, 0.6);
            -webkit-app-region: drag;
            cursor: move;
            z-index: 15;
        }

        .title-text {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 0.2em;
            color: #ffffff;
            text-shadow: 0 0 8px var(--primary-glow);
        }

        .mode-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .listening-alert {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-blue);
            transition: all 0.3s ease;
        }
        .listening-alert.active {
            background: var(--primary-glow);
            box-shadow: 0 0 8px var(--primary-glow);
        }
        .listening-alert.processing {
            background: var(--warning-orange);
            box-shadow: 0 0 8px var(--warning-orange);
        }
        .listening-alert.error {
            background: var(--danger-red);
            box-shadow: 0 0 8px var(--danger-red);
        }

        .mode-text {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--text-cyan);
            text-shadow: 0 0 4px var(--dim-blue);
            transition: color 0.3s ease;
        }

        .mode-cursor {
            font-size: 12px;
            color: var(--text-cyan);
            animation: textBlink 1s step-end infinite;
        }
        @keyframes textBlink {
            from, to { opacity: 0; }
            50% { opacity: 1; }
        }

        .clock-text {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.1em;
            color: var(--primary-glow);
            text-shadow: 0 0 4px var(--dim-blue);
        }

        /* --------------------------------------------------------------------- */
        /* MAIN CENTER - ARC REACTOR SVG */
        /* --------------------------------------------------------------------- */
        .reactor-container {
            height: 240px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle, rgba(0, 200, 255, 0.04) 0%, transparent 75%);
            border-bottom: 1px solid var(--accent-blue);
        }

        .status-ring-svg {
            width: 180px;
            height: 180px;
            transform-origin: center;
        }

        .ring {
            fill: none;
            transform-origin: 100px 100px;
            transition: stroke 0.3s ease, stroke-width 0.3s ease;
        }

        .ring.outer {
            stroke: var(--primary-glow);
            stroke-width: 2px;
            animation: rotateCW 20s linear infinite;
            filter: drop-shadow(0 0 2px var(--primary-glow));
        }

        .ring.middle {
            stroke: var(--secondary-blue);
            stroke-width: 3px;
            animation: rotateCCW 15s linear infinite;
            filter: drop-shadow(0 0 2px var(--secondary-blue));
        }

        .ring.inner {
            stroke: var(--primary-glow);
            stroke-width: 4px;
            animation: rotateCW 8s linear infinite;
            filter: drop-shadow(0 0 3px var(--primary-glow));
        }

        .hex-center {
            fill: none;
            stroke: var(--text-cyan);
            stroke-width: 2px;
            transform-origin: 100px 100px;
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes rotateCW {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes rotateCCW {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 4px var(--primary-glow)); opacity: 0.6; }
            50% { filter: drop-shadow(0 0 12px var(--primary-glow)); opacity: 1.0; }
        }
        @keyframes pulseScale {
            0%, 100% { transform: scale(1.0); }
            50% { transform: scale(1.04); }
        }

        /* --------------------------------------------------------------------- */
        /* STATE STYLING OVERRIDES */
        /* --------------------------------------------------------------------- */
        .state-listening .ring.outer {
            animation: rotateCW 5s linear infinite;
            stroke-width: 3px;
            stroke: var(--text-cyan);
            filter: drop-shadow(0 0 6px var(--text-cyan));
        }
        .state-listening .ring.middle {
            animation: rotateCCW 3.75s linear infinite;
            stroke-dasharray: 20 20;
            stroke-width: 4px;
        }
        .state-listening .ring.inner {
            animation: rotateCW 2s linear infinite;
            stroke-width: 5px;
            filter: drop-shadow(0 0 8px var(--text-cyan));
        }
        .state-listening .hex-center {
            animation: pulseGlow 0.4s ease-in-out infinite;
        }

        .state-thinking .ring {
            stroke: var(--warning-orange) !important;
        }
        .state-thinking .ring.outer {
            animation: rotateCW 3s linear infinite;
            filter: drop-shadow(0 0 4px var(--warning-orange));
        }
        .state-thinking .ring.middle {
            animation: rotateCCW 2.2s linear infinite;
        }
        .state-thinking .ring.inner {
            animation: rotateCW 1.5s linear infinite;
            filter: drop-shadow(0 0 6px var(--warning-orange));
        }
        .state-thinking .hex-center {
            stroke: var(--warning-orange);
            animation: pulseGlow 0.8s ease-in-out infinite;
        }

        .state-speaking .status-ring-svg {
            animation: pulseScale 0.3s ease-in-out infinite;
        }
        .state-speaking .ring.outer {
            stroke-width: 3px;
        }
        .state-speaking .ring.inner {
            stroke-width: 5px;
        }
        .state-speaking .hex-center {
            animation: pulseGlow 0.3s ease-in-out infinite;
        }

        .state-lost .ring {
            stroke: var(--danger-red) !important;
            animation-play-state: paused;
            opacity: 0.3;
        }
        .state-lost .hex-center {
            stroke: var(--danger-red);
            opacity: 0.2;
            animation: none;
        }

        /* --------------------------------------------------------------------- */
        /* LEFT/RIGHT DIALOG PANELS */
        /* --------------------------------------------------------------------- */
        .panels-container {
            flex: 1;
            display: flex;
            background: rgba(0, 5, 10, 0.4);
            z-index: 5;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow: hidden;
        }
        .panel.left-side {
            border-right: 1px solid var(--accent-blue);
        }

        .panel-header {
            font-size: 10px;
            color: var(--secondary-blue);
            letter-spacing: 0.2em;
            font-weight: bold;
            margin-bottom: 8px;
            border-bottom: 1px dashed rgba(0, 200, 255, 0.2);
            padding-bottom: 4px;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.5;
        }
        .panel-content::-webkit-scrollbar {
            width: 3px;
        }
        .panel-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .panel-content::-webkit-scrollbar-thumb {
            background: var(--accent-blue);
            border-radius: 1px;
        }

        .user-transcript {
            font-family: 'Share Tech Mono', monospace;
            color: var(--secondary-blue);
        }

        .jarvis-response {
            font-family: 'Orbitron', sans-serif;
            color: var(--text-cyan);
            text-shadow: 0 0 2px var(--dim-blue);
        }

        .typing-cursor {
            display: inline-block;
            width: 6px;
            height: 12px;
            background: var(--secondary-blue);
            margin-left: 2px;
            vertical-align: middle;
            animation: blinkCursor 0.8s step-end infinite;
        }
        .typing-cursor.bright {
            background: var(--text-cyan);
            box-shadow: 0 0 4px var(--text-cyan);
        }
        @keyframes blinkCursor {
            from, to { opacity: 0; }
            50% { opacity: 1; }
        }

        /* --------------------------------------------------------------------- */
        /* BOTTOM TELEMETRY BAR */
        /* --------------------------------------------------------------------- */
        .stat-container {
            height: 50px;
            border-top: 1px solid var(--accent-blue);
            background: rgba(0, 10, 20, 0.85);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            z-index: 15;
        }

        .stat-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .stat-group.text-right {
            align-items: flex-end;
        }

        .stat-label {
            font-size: 8px;
            color: var(--secondary-blue);
            letter-spacing: 0.15em;
            font-weight: 700;
        }

        .bar-graph {
            display: flex;
            gap: 2px;
        }

        .segment {
            width: 6px;
            height: 10px;
            background: rgba(0, 68, 102, 0.2);
            border: 1px solid rgba(0, 229, 255, 0.08);
            transition: all 0.2s ease;
        }
        .segment.active.blue {
            background: var(--primary-glow);
            box-shadow: 0 0 4px var(--primary-glow);
            border-color: var(--text-cyan);
        }
        .segment.active.orange {
            background: var(--warning-orange);
            box-shadow: 0 0 4px var(--warning-orange);
            border-color: #FF9900;
        }
        .segment.active.red {
            background: var(--danger-red);
            box-shadow: 0 0 4px var(--danger-red);
            border-color: #FF6633;
        }

        .ollama-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            transition: background 0.3s ease;
        }
        .status-dot.online {
            background: #00FF66;
            box-shadow: 0 0 6px #00FF66;
        }
        .status-dot.offline {
            background: var(--danger-red);
            box-shadow: 0 0 6px var(--danger-red);
        }

        .status-text {
            font-size: 9px;
            font-weight: bold;
            color: var(--text-cyan);
            letter-spacing: 0.05em;
        }

        .uptime-val {
            font-size: 11px;
            font-weight: bold;
            color: var(--text-cyan);
        }
    </style>
</head>
<body class="state-idle" id="body-root">

    <div class="hud-window" id="hud-window">
        <!-- Pure CSS Corner notches -->
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        <div class="chevron-top"></div>
        <div class="chevron-bottom"></div>

        <!-- Subtle scan line overlay -->
        <div class="scan-line"></div>
        
        <!-- TOP BAR -->
        <header class="top-bar" id="top-bar">
            <div class="title-text">J.A.R.V.I.S.</div>
            <div class="mode-container">
                <span class="listening-alert" id="listening-dot"></span>
                <span class="mode-text" id="status-label">STANDBY</span>
                <span class="mode-cursor">_</span>
            </div>
            <div class="clock-text" id="clock-text">00:00:00</div>
        </header>

        <!-- MAIN ARC REACTOR SVG -->
        <section class="reactor-container">
            <svg class="status-ring-svg" viewBox="0 0 200 200">
                <!-- Compass rose crosshair indicators -->
                <line x1="100" y1="6" x2="100" y2="194" stroke="rgba(0, 200, 255, 0.12)" stroke-width="0.75" />
                <line x1="6" y1="100" x2="194" y2="100" stroke="rgba(0, 200, 255, 0.12)" stroke-width="0.75" />
                <circle cx="100" cy="100" r="92" stroke="rgba(0, 200, 255, 0.05)" stroke-width="0.5" fill="none" />
                
                <!-- Outermost Ring - 2px, slow CW rotation -->
                <circle class="ring outer" cx="100" cy="100" r="82" stroke-dasharray="25 15 5 15" />
                
                <!-- Middle Ring - 3px, CCW rotation -->
                <circle class="ring middle" cx="100" cy="100" r="66" stroke-dasharray="60 20 10 20" />
                
                <!-- Inner Ring - 4px, segmented rose, fast CW rotation -->
                <circle class="ring inner" cx="100" cy="100" r="48" stroke-dasharray="15 8" />
                
                <!-- Hexagonal Core Arc reactor piece -->
                <polygon class="hex-center" points="100,88 111,94 111,106 100,112 89,106 89,94" />
            </svg>
        </section>

        <!-- DIALOGUE TRANSMISSION PANELS -->
        <section class="panels-container no-drag">
            <!-- Left Side: Transcribed User Input -->
            <div class="panel left-side">
                <div class="panel-header">NEURAL LINK</div>
                <div class="panel-content user-transcript" id="user-text-content">
                    <span>Awaiting vocal sync...</span>
                </div>
            </div>

            <!-- Right Side: Spoken Jarvis Response -->
            <div class="panel">
                <div class="panel-header">RESPONSE</div>
                <div class="panel-content jarvis-response" id="jarvis-text-content">
                    <span>Systems nominal, sir. Ready.</span>
                </div>
            </div>
        </section>

        <!-- STATS / DIAGNOSTICS BAR -->
        <footer class="stat-container no-drag">
            <div class="stat-group">
                <span class="stat-label">CPU_CORE</span>
                <div class="bar-graph" id="cpu-graph">
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                </div>
            </div>

            <div class="stat-group">
                <span class="stat-label">RAM_CORE</span>
                <div class="bar-graph" id="ram-graph">
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                    <div class="segment"></div>
                </div>
            </div>

            <div class="stat-group">
                <span class="stat-label">OLLAMA</span>
                <div class="ollama-status">
                    <span class="status-dot offline" id="ollama-dot"></span>
                    <span class="status-text" id="ollama-text">OFFLINE</span>
                </div>
            </div>

            <div class="stat-group text-right">
                <span class="stat-label">UPTIME</span>
                <span class="uptime-val" id="uptime-val">00:00:00</span>
            </div>
        </footer>
    </div>

    <!-- AUDIO STATE ALERTS SUB-BANNER -->
    <div style="position: absolute; bottom: 56px; left: 15px; font-size: 8px; color: var(--secondary-blue); letter-spacing: 0.15em; font-weight: bold; pointer-events: none; z-index: 10;" id="listening-text">
        STANDING BY
    </div>

    <script>
        let socket = null;
        let reconnectTimer = null;
        let currentState = 'idle';
        
        let userTypingTimer = null;
        let jarvisTypingTimer = null;

        const clockEl = document.getElementById('clock-text');
        const bodyRoot = document.getElementById('body-root');
        const statusLabel = document.getElementById('status-label');

        // WS Connection Configs
        const WS_URL = 'ws://localhost:8765';

        // 1. Right Click Context Menu Handler
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (window.api && window.api.showContextMenu) {
                window.api.showContextMenu();
            }
        });

        // 2. Double Click Minimize Title Bar
        document.getElementById('top-bar').addEventListener('dblclick', () => {
            if (window.api && window.api.minimizeToTray) {
                window.api.minimizeToTray();
            }
        });

        // 3. Real-Time Clock
        function startClock() {
            function tick() {
                const now = new Date();
                const hrs = String(now.getHours()).padStart(2, '0');
                const mins = String(now.getMinutes()).padStart(2, '0');
                const secs = String(now.getSeconds()).padStart(2, '0');
                clockEl.textContent = `${hrs}:${mins}:${secs}`;
            }
            tick();
            setInterval(tick, 1000);
        }
        startClock();

        // 4. WebSocket setup
        function connectWS() {
            console.log("HUD attempting link to J.A.R.V.I.S backend at " + WS_URL);
            socket = new WebSocket(WS_URL);

            socket.onopen = () => {
                console.log("Link established with backend server.");
                setHUDState('idle');
            };

            socket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.state) {
                        setHUDState(data.state, data);
                    }
                } catch (err) {
                    console.error("Error decoding WebSocket payload:", err);
                }
            };

            socket.onclose = () => {
                console.warn("Link severed. Attempting reconnect...");
                setHUDState('lost');
                clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(connectWS, 3000);
            };

            socket.onerror = (err) => {
                console.error("Link error:", err);
                socket.close();
            };
        }
        connectWS();

        // 5. HUD State Transitions & Animations
        function setHUDState(state, data = null) {
            currentState = state.toLowerCase();
            bodyRoot.className = `state-${currentState}`;
            
            // Clear current typewriter intervals
            clearInterval(userTypingTimer);
            clearInterval(jarvisTypingTimer);

            if (currentState === 'listening') {
                statusLabel.textContent = 'LISTENING';
                statusLabel.style.color = 'var(--text-cyan)';
                document.getElementById('listening-dot').className = 'listening-alert active';
                document.getElementById('listening-text').textContent = 'VOICE DETECTED';
            } else if (currentState === 'thinking') {
                statusLabel.textContent = 'ANALYZING';
                statusLabel.style.color = 'var(--warning-orange)';
                document.getElementById('listening-dot').className = 'listening-alert processing';
                document.getElementById('listening-text').textContent = 'NEURAL PROCESSING...';
                if (data && data.user_text) {
                    displayUserText(data.user_text);
                }
            } else if (currentState === 'speaking') {
                statusLabel.textContent = 'RESPONDING';
                statusLabel.style.color = 'var(--text-cyan)';
                document.getElementById('listening-dot').className = 'listening-alert active';
                document.getElementById('listening-text').textContent = 'TRANSMITTING';
                if (data && data.text) {
                    displayJarvisText(data.text);
                }
            } else if (currentState === 'lost') {
                statusLabel.textContent = 'LINK LOST';
                statusLabel.style.color = 'var(--danger-red)';
                document.getElementById('listening-dot').className = 'listening-alert error';
                document.getElementById('listening-text').textContent = 'CONNECTION OFFLINE';
                
                document.getElementById('ollama-dot').className = 'status-dot offline';
                document.getElementById('ollama-text').textContent = 'OFFLINE';
            } else { // idle
                statusLabel.textContent = 'STANDBY';
                statusLabel.style.color = 'var(--text-cyan)';
                document.getElementById('listening-dot').className = 'listening-alert';
                document.getElementById('listening-text').textContent = 'STANDING BY';
            }
        }

        // 6. Letter-by-letter User Typewriter Effect
        function displayUserText(text) {
            const container = document.getElementById('user-text-content');
            container.innerHTML = '';
            
            const textSpan = document.createElement('span');
            const cursor = document.createElement('span');
            cursor.className = 'typing-cursor';
            container.appendChild(textSpan);
            container.appendChild(cursor);
            
            let index = 0;
            userTypingTimer = setInterval(() => {
                if (index < text.length) {
                    textSpan.textContent += text[index];
                    index++;
                    container.scrollTop = container.scrollHeight;
                } else {
                    clearInterval(userTypingTimer);
                    cursor.remove();
                }
            }, 20); // 20ms letter typing
        }

        // 7. Word-by-word Jarvis Typewriter Effect
        function displayJarvisText(text) {
            const container = document.getElementById('jarvis-text-content');
            container.innerHTML = '';
            
            const textSpan = document.createElement('span');
            const cursor = document.createElement('span');
            cursor.className = 'typing-cursor bright';
            container.appendChild(textSpan);
            container.appendChild(cursor);
            
            const words = text.split(' ');
            let index = 0;
            jarvisTypingTimer = setInterval(() => {
                if (index < words.length) {
                    textSpan.textContent += (index === 0 ? '' : ' ') + words[index];
                    index++;
                    container.scrollTop = container.scrollHeight;
                } else {
                    clearInterval(jarvisTypingTimer);
                    cursor.remove();
                }
            }, 120); // 120ms word typing
        }

        // 8. 10-Segment Bar Graph updates
        function updateBarGraph(graphId, percentage) {
            const graph = document.getElementById(graphId);
            if (!graph) return;
            const segments = graph.querySelectorAll('.segment');
            const activeCount = Math.round(percentage / 10);
            
            segments.forEach((seg, index) => {
                if (index < activeCount) {
                    seg.classList.add('active');
                    if (index < 5) {
                        seg.className = 'segment active blue';
                    } else if (index < 8) {
                        seg.className = 'segment active orange';
                    } else {
                        seg.className = 'segment active red';
                    }
                } else {
                    seg.className = 'segment';
                }
            });
        }

        // 9. Telemetry callbacks from Electron
        if (window.api) {
            window.api.onTelemetryUpdate((data) => {
                // Update CPU/RAM bar graphs
                updateBarGraph('cpu-graph', data.cpu);
                updateBarGraph('ram-graph', data.ram);
                
                // Update Uptime
                document.getElementById('uptime-val').textContent = data.uptime;
                
                // Update Ollama dot (ONLINE if model is loaded, otherwise OFFLINE)
                if (data.model && data.model !== '--' && currentState !== 'lost') {
                    document.getElementById('ollama-dot').className = 'status-dot online';
                    document.getElementById('ollama-text').textContent = 'ONLINE';
                } else if (currentState !== 'lost') {
                    document.getElementById('ollama-dot').className = 'status-dot offline';
                    document.getElementById('ollama-text').textContent = 'OFFLINE';
                }
            });
            
            window.api.onAlwaysOnTopChanged((state) => {
                console.log("Window always-on-top changed to: ", state);
            });
        }
    </script>
</body>
</html>
